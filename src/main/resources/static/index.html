<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Management — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    :root {
      --brand-dark: #0d1b2a;
      --brand-mid:  #1b3a5c;
      --brand-accent: #2979ff;
    }
    body {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-mid) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }
    .brand-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-header .icon {
      width: 56px;
      height: 56px;
      background: var(--brand-accent);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }
    .brand-header .icon svg { fill: #fff; }
    .brand-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--brand-dark);
      margin: 0;
    }
    .brand-header p {
      font-size: 0.85rem;
      color: #6b7280;
      margin: 0.25rem 0 0;
    }
    .form-label { font-weight: 600; font-size: 0.875rem; color: #374151; }
    .form-control:focus {
      border-color: var(--brand-accent);
      box-shadow: 0 0 0 0.2rem rgba(41,121,255,.2);
    }
    .btn-login {
      background: var(--brand-accent);
      border: none;
      color: #fff;
      font-weight: 600;
      letter-spacing: .03em;
      padding: .625rem;
    }
    .btn-login:hover { background: #1a6aff; color: #fff; }
    #errorMsg {
      display: none;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-header">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28">
          <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/>
        </svg>
      </div>
      <h1>Attendance System</h1>
      <p>Sign in to manage attendance records</p>
    </div>

    <div id="errorMsg" class="alert alert-danger" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="username" required />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-login w-100" id="submitBtn">
        <span id="btnText">Sign In</span>
        <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
      </button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('jwt_token')) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
    function hideError() {
      errorMsg.style.display = 'none';
    }
    function setLoading(loading) {
      submitBtn.disabled = loading;
      btnText.textContent = loading ? 'Signing in…' : 'Sign In';
      btnSpinner.classList.toggle('d-none', !loading);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      setLoading(true);
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.message || 'Invalid username or password.');
          return;
        }

        // data contains: token, username, role, expiration, user
        localStorage.setItem('jwt_token', data.token);
        localStorage.setItem('jwt_username', data.username);
        localStorage.setItem('jwt_role', data.role ?? '');
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError('Could not connect to server. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
